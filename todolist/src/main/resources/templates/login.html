<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - To-Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="login-page">

    <div class="container px-2 py-4 py-md-0">

        <div class="row justify-content-center min-vh-100 align-items-center">

            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="auth-container">

                    <h1 class="auth-title">
                        Bienvenue sur To-Do List
                    </h1>

                    <div class="alert alert-danger" th:if="${param.error}">
                        Nom d'utilisateur ou mot de passe incorrect.
                    </div>

                    <div class="alert alert-success" th:if="${param.registered}">
                        Compte créé avec succès. Vous pouvez vous connecter.
                    </div>

                    <div class="alert alert-success" th:if="${param.logout}">
                        Vous êtes déconnecté.
                    </div>

                    <form method="post" th:action="@{/login}">

                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Nom d'utilisateur
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                name="username"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Mot de passe
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password">
                        </div>

                        <button
                            type="submit"
                            class="btn btn-login w-100">
                            Se connecter
                        </button>

                        <div class="auth-links">

                            <a href="#" class="forgot-password">
                                Mot de passe oublié ?
                            </a>

                            <a href="/signup" class="sign-up">
                                S'inscrire
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
