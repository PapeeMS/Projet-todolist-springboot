<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription (1/2) - To-Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="login-page">

    <div class="container px-2 py-4 py-md-0">

        <div class="row justify-content-center min-vh-100 align-items-center">

            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="auth-container">

                    <h1 class="auth-title">
                        Créer votre compte (1/2)
                    </h1>

                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                    <form method="post" th:action="@{/signup/step1}">

                        <div class="mb-3">

                            <label for="username" class="form-label">
                                Nom d'utilisateur
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                name="username"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-login w-100">
                            Suivant ➡
                        </button>

                        <div class="auth-links mt-3 text-center">

                            <a th:href="@{/login}" class="sign-up">
                                Vous avez déjà un compte ? Connectez-vous
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
