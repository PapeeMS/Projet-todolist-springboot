<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription (2/2) - To-Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="login-page">

    <div class="container px-2 py-4 py-md-0">

        <div class="row justify-content-center min-vh-100 align-items-center">

            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="auth-container">

                    <h1 class="auth-title">
                        Sécurité du compte (2/2)
                    </h1>

                    <p class="text-center mb-4">
                        Bienvenue <strong th:text="${username}">Utilisateur</strong> !
                        <br>
                        Veuillez définir votre mot de passe.
                    </p>

                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                    <form method="post" th:action="@{/signup/step2}">

                        <div class="mb-3">

                            <label for="password" class="form-label">
                                Mot de passe
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="confirm-password" class="form-label">
                                Confirmer le mot de passe
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="confirm-password"
                                name="password_confirm"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-login w-100">
                            Terminer l'inscription
                        </button>

                        <div class="auth-links mt-3 text-center">

                            <a th:href="@{/signup}" class="sign-up">
                                ⬅ Retour pour changer de nom
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        document.querySelector('form').addEventListener('submit', function(e) {

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {

                e.preventDefault();
                alert('Les mots de passe ne correspondent pas !');

            }

        });

    </script>

</body>
</html>
