<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier une tâche - To-Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="add-task-page">

<div class="container px-2 py-4 py-md-0">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">

            <div class="add-task-container">
                <h1 class="page-title">Modifier la tâche</h1>

                <div class="form-section">
                    <form th:action="@{/tasks/{id}/edit(id=${task.id})}" method="post" th:object="${task}">

                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{isDone}">

                        <div class="mb-4">
                            <label for="title" class="form-label">Titre de la tâche</label>
                            <input
                                    type="text"
                                    class="form-control"
                                    id="title"
                                    th:field="*{title}"
                                    placeholder="Entrer le titre de la tâche"
                                    required>
                        </div>

                        <div class="mb-4">
                            <label for="taskDescription" class="form-label">Description de la tâche</label>
                            <textarea
                                    class="form-control"
                                    id="taskDescription"
                                    th:field="*{taskDescription}"
                                    rows="4"
                                    placeholder="Entrer la description de la tâche"></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="deadline" class="form-label">Deadline</label>
                            <input
                                    type="datetime-local"
                                    class="form-control"
                                    id="deadline"
                                    th:field="*{deadline}"
                                    required>
                        </div>

                        <div class="form-actions">
                            <a class="btn btn-cancel" th:href="@{/tasks/{id}(id=${task.id})}">
                                Annuler
                            </a>

                            <button type="submit" class="btn btn-save">
                                Enregistrer
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
